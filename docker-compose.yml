version: '3.8'

services:
  # Database (PostgreSQL)
  db:
    # Use a lightweight PostgreSQL image. The init.sql will create tables and seed data on first run.
    image: pgvector/pgvector:pg15
    # Mount a volume for data persistence and to run initialization scripts
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    environment:
    # Set environment variables for PostgreSQL. These will be used to create the initial database and user.
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=securepassword
      - POSTGRES_DB=library_db
      # Expose the default PostgreSQL port
    networks:
      - library_network

  # Backend API (FastAPI)
  
  backend:
    build: ./backend
    ports:
      - "8080:8080" # Spring Boot default port
    env_file:
      - .env
  
    depends_on:
      - db
      - redis
    environment:
      # Spring Boot uses standard JDBC URLs
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/library_db
      - SPRING_DATASOURCE_USERNAME=admin
      - SPRING_DATASOURCE_PASSWORD=securepassword
      # Hibernate is read-only. Flyway owns all schema changes.
      - SPRING_JPA_HIBERNATE_DDL_AUTO=validate
      - SPRING_JPA_PROPERTIES_HIBERNATE_DIALECT=org.hibernate.dialect.PostgreSQLDialect
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    networks:
      - library_network
  # Frontend (React + Vite)
  frontend:
    build: ./frontend
    # In dev, install deps into container volume before starting Vite.
    command: sh -c "npm install && npm run dev -- --host"
    # Mount the frontend code and node_modules. The --host flag allows Vite to be accessible from outside the container.
    volumes:
      - ./frontend:/app
      - /app/node_modules # Prevent host node_modules from overriding container
    ports:
      - "5173:5173"
      - "6006:6006"
    environment:
      - VITE_API_URL=http://localhost:8080/api/v1 # Browser talks to localhost
    networks:
      - library_network

  # Redis (for caching)
  redis:
    image: redis:alpine
    networks:
      - library_network
  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin4_container
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: root
    ports:
      - "5050:80"
    depends_on:
      - db  # Change this if your postgres service is named something else (e.g., postgres)
    networks:             # <--- ADD THIS
      - library_network
  loki:
    image: grafana/loki:latest
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - library_network

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
    depends_on:
      - loki
    networks:
      - library_network
volumes:
  postgres_data:

networks:
# Define a custom network for our services to communicate securely
  library_network:
    driver: bridge # Use the default bridge network driver for simplicity
